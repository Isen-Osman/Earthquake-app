services:
  db:
    image: postgres:17.0
    container_name: earthquake_db
    restart: always

    environment:
      POSTGRES_DB: earthquake_db
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo

    ports:
      - "5435:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: